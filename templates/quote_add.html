{% extends "base.html" %}

{% block title %}添加话语 - 思乡签到{% endblock %}

{% block content %}
<div class="form-container">
    <h2>添加自定义话语</h2>
    <form method="POST" action="{{ url_for('quotes.add_quote') }}">
        <div class="form-group">
            <label for="content">话语内容</label>
            <textarea id="content" name="content" rows="4" required maxlength="100" placeholder="输入你想说的话..."></textarea>
        </div>
        <div class="form-group">
            <label for="category">分类</label>
            <select id="category" name="category">
                <option value="个人">个人</option>
                <option value="感悟">感悟</option>
                <option value="亲情">亲情</option>
                <option value="现代">现代</option>
                <option value="古诗">古诗</option>
            </select>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">保存</button>
            <a href="{{ url_for('quotes.index') }}" class="btn btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}
