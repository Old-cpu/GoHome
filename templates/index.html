{% extends "base.html" %}

{% block title %}首页 - 思乡签到{% endblock %}

{% block content %}
<div class="hero">
    <h1>思乡签到</h1>
    <p class="hero-subtitle">记录离家的每一天，珍藏每一份思念</p>
    <div class="hero-actions">
        <a href="{{ url_for('auth.register') }}" class="btn btn-primary">立即注册</a>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">登录</a>
    </div>
</div>

<div class="features">
    <div class="feature">
        <div class="feature-icon">📅</div>
        <h3>每日签到</h3>
        <p>记录每一个在外的日子，不忘对家的思念</p>
    </div>
    <div class="feature">
        <div class="feature-icon">💭</div>
        <h3>思乡话语</h3>
        <p>每次签到生成一句温暖的思乡话语，慰藉游子心</p>
    </div>
    <div class="feature">
        <div class="feature-icon">📊</div>
        <h3>数据统计</h3>
        <p>记录离家天数、签到天数，珍藏每一份坚持</p>
    </div>
</div>
{% endblock %}
