{% extends "base.html" %}

{% block title %}登录 - 思乡签到{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>用户登录</h2>
        <form method="POST" action="{{ url_for('auth.login') }}">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required minlength="3" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required minlength="6" placeholder="请输入密码">
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" name="remember"> 记住我
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-block">登录</button>
        </form>
        <p class="auth-footer">
            还没有账号？<a href="{{ url_for('auth.register') }}">立即注册</a>
        </p>
        <div class="demo-info">
            <p>演示账号：<code>demo</code> / <code>123456</code></p>
        </div>
    </div>
</div>

<style>
.demo-info {
    margin-top: 1.5rem;
    padding: 1rem;
    background: var(--bg-warm);
    border-radius: 12px;
    text-align: center;
    font-size: 0.9rem;
    color: var(--text-muted);
    border: 1px dashed var(--primary-light);
}
.demo-info code {
    background: var(--card-bg);
    padding: 0.25rem 0.5rem;
    border-radius: 4px;
    color: var(--primary-color);
    font-family: monospace;
    margin: 0 0.25rem;
}
</style>
{% endblock %}
