{% extends "base.html" %}

{% block title %}签到 - 思乡签到{% endblock %}

{% block content %}
<div class="checkin-container">
    <div class="checkin-card">
        <h2>今日签到</h2>
        <p class="checkin-date">{{ days_away }}天</p>

        <div class="checkin-info">
            <p>离家已 <strong>{{ user.get_days_away_from_home() }}</strong> 天</p>
            <p>来自 <strong>{{ user.hometown or '远方' }}</strong> 的你在 <strong>{{ user.current_city or '他乡' }}</strong> 打拼</p>
        </div>

        <form method="POST" action="{{ url_for('checkin.do_checkin') }}" class="checkin-form">
            <button type="submit" class="btn btn-primary btn-checkin">
                <span class="btn-icon">📍</span>
                点击签到
            </button>
        </form>
    </div>
</div>
{% endblock %}
