{% extends "base.html" %}

{% block title %}个人资料 - 思乡签到{% endblock %}

{% block content %}
<div class="profile-container">
    <h2>个人资料</h2>
    <form method="POST" action="{{ url_for('dashboard.profile') }}">
        <div class="form-group">
            <label for="username">用户名</label>
            <input type="text" id="username" value="{{ user.username }}" disabled>
            <small>用户名不可修改</small>
        </div>
        <div class="form-group">
            <label for="hometown">家乡</label>
            <input type="text" id="hometown" name="hometown" value="{{ user.hometown or '' }}" placeholder="例如：湖南长沙">
        </div>
        <div class="form-group">
            <label for="current_city">当前城市</label>
            <input type="text" id="current_city" name="current_city" value="{{ user.current_city or '' }}" placeholder="例如：北京">
        </div>
        <div class="form-group">
            <label for="leave_home_date">离家日期</label>
            <input type="date" id="leave_home_date" name="leave_home_date" value="{{ user.leave_home_date or '' }}">
        </div>
        <button type="submit" class="btn btn-primary">保存修改</button>
    </form>

    <div class="profile-info">
        <h3>账户信息</h3>
        <p>注册时间：{{ user.created_at[:10] if user.created_at else '未知' }}</p>
        <p>累计签到：{{ stats.total_days }} 天</p>
        <p>最长连续签到：{{ stats.longest_streak }} 天</p>
    </div>
</div>
{% endblock %}
